{% extends 'veterinaria/base.html' %}
{% block title %}{{ titulo }}{% endblock %}
{% block content %}

<div class="top-bar">
    <h1>{{ titulo }}</h1>
    <a href="{{ url_volver }}" class="btn btn-gray">← Volver</a>
</div>

<div style="background:white; padding:1.5rem; border-radius:8px; max-width:600px;">
    <form method="POST">
        {% csrf_token %}
        {% for field in form %}
        <div class="form-group">
            <label>{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}
                <p style="color:red; font-size:0.85rem;">{{ field.errors.0 }}</p>
            {% endif %}
        </div>
        {% endfor %}
        <br>
        <button type="submit" class="btn btn-green">Guardar</button>
        <a href="{{ url_volver }}" class="btn btn-gray">Cancelar</a>
    </form>
</div>

{% endblock %}
