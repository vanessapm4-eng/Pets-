{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}PETS S.A.{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'estilos.css' %}">
</head>
<body>
<nav>
    <a href="{% url 'dashboard' %}">🐾 PETS S.A.</a>
    <a href="{% url 'mascota_lista' %}">Mascotas</a>
    <a href="{% url 'cliente_lista' %}">Clientes</a>

</nav>
<div class="container">

        <div class="alert">{{ message }}</div>
    {% endfor %}
    {% block content %}{% endblock %}
</div>

</html>
